<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gia Phả Dòng Họ Bùi Thủy Nguyên - Hải Phòng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        #tree-container { 
            width: 100%; height: 800px; background: #fafaf9; 
            border-radius: 12px; border: 1px solid #e7e5e4;
            cursor: grab; overflow: hidden; position: relative;
        }
        .node rect { fill: #fff; stroke: #991b1b; stroke-width: 2px; rx: 6; }
        .node text { font-size: 13px; font-weight: 600; fill: #7f1d1d; pointer-events: none; }
        .link { fill: none; stroke: #d6d3d1; stroke-width: 1.5px; }
        .tooltip { 
            position: absolute; padding: 12px; background: white; 
            border: 2px solid #991b1b; border-radius: 8px; 
            pointer-events: none; opacity: 0; box-shadow: 0 10px 15px rgba(0,0,0,0.1); 
            z-index: 1000; min-width: 200px;
        }
        .controls { position: absolute; top: 20px; left: 20px; z-index: 50; display: flex; gap: 10px; }
    </style>
</head>
<body class="bg-stone-50 text-stone-900">

    <nav class="bg-red-900 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold uppercase tracking-tight">Hệ Thống Gia Phả Trực Tuyến</h1>
            <div id="status" class="text-xs bg-amber-600 px-3 py-1 rounded font-bold italic">Đang tìm file giapha.xlsx...</div>
        </div>
    </nav>

    <div class="container mx-auto p-4">
        <div class="bg-white p-2 rounded-xl shadow-md relative">
            <div class="controls">
                <button onclick="changeDirection('horizontal')" class="bg-red-900 text-white px-4 py-2 rounded shadow hover:bg-red-800 font-bold transition">➡️ Chiều ngang</button>
                <button onclick="changeDirection('vertical')" class="bg-white border border-red-900 text-red-900 px-4 py-2 rounded shadow hover:bg-red-50 font-bold transition">⬇️ Chiều dọc</button>
            </div>

            <div id="tree-container"></div>
            <div id="tooltip" class="tooltip"></div>
            
            <div class="absolute bottom-4 left-4 text-[11px] text-stone-500 bg-white/90 p-2 rounded border border-stone-200">
                <b>Hướng dẫn:</b> Lăn chuột để Phóng to | Nhấn giữ chuột để di chuyển sơ đồ.
            </div>
        </div>
    </div>

    <script>
        let currentData = null;
        let currentDirection = 'horizontal'; // MẶC ĐỊNH CHIỀU NGANG THEO YÊU CẦU

        // HÀM TỰ ĐỘNG CHẠY KHI MỞ TRANG
        window.addEventListener('DOMContentLoaded', (event) => {
            fetch('giapha.xlsx')
                .then(response => {
                    if (!response.ok) throw new Error("File không tồn tại");
                    return response.arrayBuffer();
                })
                .then(buffer => {
                    processExcel(buffer);
                })
                .catch(error => {
                    console.error("Lỗi tự động đọc file:", error);
                    document.getElementById('status').innerText = "CẦN TẢI FILE: Hãy chọn file giapha.xlsx từ máy tính của bạn ->";
                    document.getElementById('status').innerHTML += `<input type="file" id="manual-upload" accept=".xlsx" class="ml-2 bg-white text-black p-1 rounded">`;
                    
                    document.getElementById('manual-upload').addEventListener('change', function(e) {
                        const reader = new FileReader();
                        reader.onload = (evt) => processExcel(evt.target.result);
                        reader.readAsArrayBuffer(e.target.files[0]);
                    });
                });
        });

        function processExcel(buffer) {
            const workbook = XLSX.read(buffer, { type: 'array' });
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            
            const dataMap = {};
            rows.forEach(r => {
                const id = String(r.ID).trim();
                dataMap[id] = { ...r, id: id, children: [] };
            });

            let rootData = null;
            rows.forEach(r => {
                const id = String(r.ID).trim();
                const pid = String(r.ParentID || "").trim();
                if (pid === "0" || pid === "" || !dataMap[pid]) {
                    rootData = dataMap[id];
                } else if (dataMap[pid]) {
                    dataMap[pid].children.push(dataMap[id]);
                }
            });

            currentData = rootData;
            if (currentData) {
                document.getElementById('status').innerText = "ĐÃ TẢI THÀNH CÔNG: " + currentData.Name;
                document.getElementById('status').className = "text-xs bg-green-700 px-3 py-1 rounded font-bold";
                drawTree();
            }
        }

        function changeDirection(dir) {
            currentDirection = dir;
            if(currentData) drawTree();
        }

        function drawTree() {
            const container = d3.select("#tree-container");
            container.selectAll("*").remove();

            const containerNode = document.getElementById("tree-container");
            const width = containerNode.offsetWidth;
            const height = 800;

            const svg = container.append("svg")
                .attr("width", "100%")
                .attr("height", height)
                .call(d3.zoom().scaleExtent([0.1, 3]).on("zoom", (e) => g.attr("transform", e.transform)))
                .append("g");

            const g = svg.append("g").attr("transform", "translate(150, 400)"); // Căn giữa theo chiều ngang

            // Tùy chỉnh khoảng cách node: [Chiều rộng nốt, Chiều cao tầng]
            const treeLayout = d3.tree().nodeSize(
                currentDirection === 'horizontal' ? [80, 250] : [250, 150]
            );

            const hierarchy = d3.hierarchy(currentData);
            const treeData = treeLayout(hierarchy);

            // Vẽ đường nối
            g.selectAll(".link")
                .data(treeData.links())
                .enter().append("path")
                .attr("class", "link")
                .attr("d", d3.linkHorizontal() // Luôn dùng linkHorizontal hoặc linkVertical tùy hướng
                    .x(d => currentDirection === 'horizontal' ? d.y : d.x)
                    .y(d => currentDirection === 'horizontal' ? d.x : d.y)
                );

            // Vẽ Node
            const nodes = g.selectAll(".node")
                .data(treeData.descendants())
                .enter().append("g")
                .attr("class", "node")
                .attr("transform", d => {
                    const x = currentDirection === 'horizontal' ? d.y : d.x;
                    const y = currentDirection === 'horizontal' ? d.x : d.y;
                    return `translate(${x},${y})`;
                })
                .on("mouseover", (event, d) => {
                    d3.select("#tooltip").style("opacity", 1)
                        .html(`
                            <div class="font-bold text-red-900 border-b pb-1 mb-2 text-base">${d.data.Name}</div>
                            <div class="text-xs"><b>Thế hệ:</b> ${d.data.Generation}</div>
                            <div class="text-xs"><b>Sinh:</b> ${d.data.Birth || "---"}</div>
                            <div class="text-xs"><b>Mất:</b> ${d.data.Death || "---"}</div>
                            <div class="text-xs font-bold text-blue-700 mt-1 uppercase">SĐT: ${d.data.Phone || "---"}</div>
	            <div class="text-xs font-bold text-red 700 mt-1 uppercase">Ghi chú: ${d.data.Note || "---"}</div>
                        `)
                        .style("left", (event.pageX + 20) + "px")
                        .style("top", (event.pageY - 20) + "px");
                })
                .on("mouseout", () => d3.select("#tooltip").style("opacity", 0));

            // Ô chứa tên thành viên
            nodes.append("rect")
                .attr("width", 160)
                .attr("height", 40)
                .attr("x", -80)
                .attr("y", -20)
                .style("filter", "drop-shadow(2px 2px 2px rgba(0,0,0,0.1))");

            // Chữ hiển thị tên
            nodes.append("text")
                .attr("dy", ".35em")
                .attr("text-anchor", "middle")
                .text(d => d.data.Name);
        }
    </script>
</body>
</html>
