<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gia Phả Họ Bùi - Thủy Nguyên </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        #tree-container { 
            width: 100%; height: 85vh; background-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi_2vGSGtW73AXmAM11tsfSAhYCn-mBKnQU5blub1IpoiWZ5gOlDwc2LtKrOFjHMg6Cv5hIPys53FCCrlBW5nNUXgR6_YBPbQCG1xC0oTDuHJz0tJjNNchkOozvAaSPWdjE9CG-p06tp04/s1600/nengiaphavang.jpg');
            background-size: cover; background-position: center; border-radius: 20px; border: 2px solid #d4d4d8; position: relative; overflow: hidden;
        }
        #tree-container::before { content: ''; position: absolute; inset: 0; background: rgba(255, 255, 255, 0.85); z-index: 1; }
        #tree-container svg { position: relative; z-index: 2; cursor: grab; }
        .node rect { stroke-width: 2.5px; rx: 12; cursor: pointer; }
        .name-txt { font-size: 14px; font-weight: 800; }
        .info-txt { font-size: 10.5px; font-weight: 600; }
        .note-txt { font-size: 9px; font-weight: 500; font-style: italic; }
        .link { fill: none; stroke: #5d4037; stroke-width: 2.5px; opacity: 0.4; }
        .toggle-btn circle { stroke: #fff; stroke-width: 1.5px; cursor: pointer; }
        .toggle-btn text { fill: #fff; font-size: 14px; font-weight: bold; pointer-events: none; text-anchor: middle; }
    </style>
</head>
<body class="bg-stone-100 font-sans">

    <nav class="bg-stone-800 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-4">
            <h1 class="text-xl font-bold uppercase tracking-widest text-orange-200">Gia Phả Họ Bùi - Thủy Nguyên</h1>
            <label for="manual-upload" class="text-xs bg-orange-200 text-stone-900 px-4 py-2 rounded-full font-bold cursor-pointer hover:bg-orange-300 transition">NẠP FILE EXCEL</label>
            <input type="file" id="manual-upload" accept=".xlsx" class="hidden">
        </div>
    </nav>

    <div class="container mx-auto p-4">
        <div class="bg-white p-3 rounded-2xl shadow-2xl relative border border-stone-200">
            <div id="tree-container"></div>
        </div>
    </div>

    <script>
        let root, svg, g;
        const genColors = [
            { bg: "#45270a", txt: "#ffffff", bd: "#2d1a07" },
            { bg: "#713f12", txt: "#ffffff", bd: "#5d3510" },
            { bg: "#166534", txt: "#ffffff", bd: "#064e3b" },
            { bg: "#15803d", txt: "#ffffff", bd: "#14532d" },
            { bg: "#86efac", txt: "#064e3b", bd: "#22c55e" },
            { bg: "#bbf7d0", txt: "#064e3b", bd: "#4ade80" },
            { bg: "#f0fdf4", txt: "#166534", bd: "#bbf7d0" }
        ];

        // --- HÀM XỬ LÝ NGÀY THÁNG ĐẶC TRỊ LỆCH 1 NGÀY ---
        function parseExcelDate(val) {
            if (!val) return "";
            
            // Nếu là dạng số Serial (Excel hay trả về dạng này)
            if (typeof val === 'number') {
                // Sử dụng hàm nội bộ của thư viện XLSX để chuyển đổi chính xác không lệch múi giờ
                let dateObj = XLSX.SSF.parse_date_code(val);
                let d = dateObj.d, m = dateObj.m, y = dateObj.y;
                
                // Nếu là ngày đầu năm mặc định, chỉ hiện năm
                if (d === 1 && m === 1) return y.toString();
                return `${d < 10 ? '0'+d : d}/${m < 10 ? '0'+m : m}/${y}`;
            } 
            
            // Nếu là Date Object
            if (val instanceof Date) {
                // Ép về múi giờ UTC để tránh lệch ngày do múi giờ địa phương
                const d = val.getUTCDate();
                const m = val.getUTCMonth() + 1;
                const y = val.getUTCFullYear();
                if (d === 1 && m === 1) return y.toString();
                return `${d < 10 ? '0'+d : d}/${m < 10 ? '0'+m : m}/${y}`;
            }

            // Nếu là String (chuỗi nhập tay)
            let str = String(val).trim();
            if (str.includes('/')) {
                let parts = str.split('/');
                if (parts.length === 3) {
                    let d = parts[0].padStart(2, '0');
                    let m = parts[1].padStart(2, '0');
                    let y = parts[2];
                    if (d === "01" && m === "01") return y;
                    return `${d}/${m}/${y}`;
                }
            }
            return str;
        }

        window.addEventListener('DOMContentLoaded', () => {
            fetch('giapha.xlsx').then(res => res.arrayBuffer()).then(buffer => processExcel(buffer)).catch(() => {});
        });

        document.getElementById('manual-upload').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (evt) => processExcel(evt.target.result);
            reader.readAsArrayBuffer(e.target.files[0]);
        };

        function processExcel(buffer) {
            // Tắt cellDates để lấy con số serial gốc, tránh JS tự suy diễn múi giờ
            const workbook = XLSX.read(buffer, { type: 'array', cellDates: false });
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            
            const dataMap = {};
            rows.forEach(r => {
                const id = String(r.ID || "").trim();
                if(id) dataMap[id] = { ...r, id, children: [] };
            });

            let treeData = null;
            rows.forEach(r => {
                const id = String(r.ID || "").trim();
                const pid = String(r.ParentID || "").trim();
                if (id && (pid === "0" || pid === "" || !dataMap[pid])) treeData = dataMap[id];
                else if (id && dataMap[pid]) dataMap[pid].children.push(dataMap[id]);
            });

            if (treeData) initTree(treeData);
        }

        function wrapNote(text, width) {
            text.each(function() {
                let textNode = d3.select(this),
                    words = textNode.text().split(/\s+/).reverse(),
                    word, line = [], lineNumber = 0, lineHeight = 1.1,
                    x = textNode.attr("x"),
                    y = textNode.attr("y"),
                    tspan = textNode.text(null).append("tspan").attr("x", x).attr("y", y).attr("dy", "0.3em");
                
                while (word = words.pop()) {
                    line.push(word);
                    tspan.text(line.join(" "));
                    if (tspan.node().getComputedTextLength() > width) {
                        line.pop();
                        tspan.text(line.join(" "));
                        line = [word];
                        tspan = textNode.append("tspan").attr("x", x).attr("y", y).attr("dy", lineHeight + "em").text(word);
                        lineNumber++;
                    }
                }
                if (lineNumber > 0) textNode.attr("y", parseFloat(y) - (lineNumber * 2));
            });
        }

        function initTree(treeData) {
            const container = d3.select("#tree-container");
            container.selectAll("svg").remove();
            const width = container.node().offsetWidth;
            const height = container.node().offsetHeight;
            svg = container.append("svg").attr("width", "100%").attr("height", "100%")
                .call(d3.zoom().scaleExtent([0.1, 3]).on("zoom", (e) => g.attr("transform", e.transform)))
                .append("g");
            g = svg.append("g").attr("transform", `translate(${width/2}, ${height - 120})`);
            root = d3.hierarchy(treeData);
            root.descendants().forEach(d => { if (d.depth >= 5 && d.children) { d._children = d.children; d.children = null; } });
            update(root);
        }

        function update(source) {
            const treeLayout = d3.tree().nodeSize([230, 270]);
            const treeData = treeLayout(root);
            const nodes = treeData.descendants();
            nodes.forEach(d => { d.y = -(d.depth * 270); });

            const link = g.selectAll(".link").data(treeData.links(), d => d.target.id);
            link.enter().append("path").attr("class", "link").merge(link).transition().duration(750)
                .attr("d", d3.linkVertical().x(d => d.x).y(d => d.y));
            link.exit().remove();

            const node = g.selectAll(".node").data(nodes, d => d.data.id);
            const nodeEnter = node.enter().append("g").attr("class", "node")
                .attr("transform", d => `translate(${source.x0 || 0},${source.y0 || 0})`);

            nodeEnter.append("rect").attr("width", 200).attr("height", 140).attr("x", -100).attr("y", -70)
                .on("click", (e, d) => { if(d.children || d._children) toggle(e, d); });

            nodeEnter.append("text").attr("class", "name-txt").attr("y", -42).attr("text-anchor", "middle");
            nodeEnter.append("text").attr("class", "info-txt").attr("y", -20).attr("text-anchor", "middle");
            nodeEnter.append("text").attr("class", "info-txt").attr("y", 2).attr("text-anchor", "middle");
            nodeEnter.append("text").attr("class", "info-txt").attr("y", 24).attr("text-anchor", "middle");
            nodeEnter.append("text").attr("class", "note-txt").attr("x", 0).attr("y", 45).attr("text-anchor", "middle");

            const btn = nodeEnter.append("g").attr("class", "toggle-btn").on("click", (e, d) => { e.stopPropagation(); toggle(e, d); });
            btn.append("circle").attr("r", 12);
            btn.append("text").attr("dy", "0.35em");

            const nodeUpdate = nodeEnter.merge(node);
            nodeUpdate.transition().duration(750).attr("transform", d => `translate(${d.x},${d.y})`);

            nodeUpdate.select("rect").style("fill", d => genColors[Math.min(d.depth, 6)].bg).style("stroke", d => genColors[Math.min(d.depth, 6)].bd);
            nodeUpdate.select(".name-txt").text(d => d.data.Name).style("fill", d => genColors[Math.min(d.depth, 6)].txt);
            nodeUpdate.select("text:nth-of-type(2)").text(d => "Thế hệ: " + (d.data.Generation || "?")).style("fill", d => genColors[Math.min(d.depth, 6)].txt);
            
            nodeUpdate.select("text:nth-of-type(3)").text(d => {
                let b = parseExcelDate(d.data.Birth);
                let dd = parseExcelDate(d.data.Death);
                if (!b && !dd) return "";
                return `(${b || "?"} - ${dd || "nay"})`;
            }).style("fill", d => genColors[Math.min(d.depth, 6)].txt);

            nodeUpdate.select("text:nth-of-type(4)").text(d => d.data.Phone ? "📞 " + d.data.Phone : "").style("fill", d => genColors[Math.min(d.depth, 6)].txt);
            
            nodeUpdate.select(".note-txt")
                .text(d => d.data.Note ? "📝 " + d.data.Note : "")
                .style("fill", d => genColors[Math.min(d.depth, 6)].txt)
                .call(wrapNote, 180);

            nodeUpdate.select(".toggle-btn").attr("display", d => (d.children || d._children) ? "block" : "none").attr("transform", "translate(0, -70)");
            nodeUpdate.select(".toggle-btn circle").style("fill", d => genColors[Math.min(d.depth, 6)].bd);
            nodeUpdate.select(".toggle-btn text").text(d => d.children ? "-" : "+");

            node.exit().remove();
            nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
        }

        function toggle(e, d) { 
            if (d.children) { d._children = d.children; d.children = null; } 
            else { d.children = d._children; d._children = null; } 
            update(d); 
        }
    </script>
</body>
</html>
